<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contato e Reserva</title>
  </head>
  <body>
    <header>
      <nav>
        <ul>
          <li><a href="../index.html">Home</a></li>
          <li><a href="destino.html">Destinos</a></li>
          <li><a href="pacotes-servicos.html">Pacotes ou Serviços</a></li>
        </ul>
      </nav>
    </header>
    <main>
      <form action="" method="get">
        <fieldset>
          <legend>Formulário</legend>
          <label for="nome">Nome</label><br />
          <input type="text" name="nome" required />
          <br />

          <label for="email">Email</label><br />
          <input type="email" name="email" required />
          <br />

          <input type="radio" name="destino" value="Caldas Novas" />
          <label for="destino">Caldas Novas</label>

          <input type="radio" name="destino" value="Río de Janeiro" />
          <label for="destino">Río de Janeiro</label>

          <input type="radio" name="destino" value="Bahia" />
          <label for="destino">Bahia</label>
          <br />

          <label for="data">Data</label><br />
          <input type="date" name="data" required />
          <br />

          <label>Quantidade de pessoas:</label><br />
          <input type="number" name="pessoas" min="1" required /><br />

          <label>Mensagem:</label><br />
          <textarea name="mensagem" rows="5" cols="30"></textarea><br />
          <br />

          <button>eviar</button>
        </fieldset>
      </form>
    </main>
    <footer><p>© 2026 Travel World®</p></footer>
  </body>
</html>
