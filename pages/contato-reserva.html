<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../css/style.css" />
    <title>Contato e Reserva</title>
  </head>
  <body>
    <header class="cabecalho">
      <nav>
        <div class="container">
          <input type="checkbox" id="menu" class="container__botao" />
          <label for="menu">
            <span class="cabecalho__menu-hamburguer container__imagem"> </span>
          </label>
          <ul class="lista-menu">
            <li class="lista-menu__titulo">Páginas</li>
            <li class="lista-menu__item">
              <a href="../index.html" class="lista-menu__link">Página inicial</a>
            </li>
            <li class="lista-menu__item">
              <a href="../pages/pacotes-servicos.html" class="lista-menu__link"
                >Serviços</a
              >
            </li>
            <li class="lista-menu__item">
              <a href="../pages/destino.html" class="lista-menu__link"
                >Destino</a
              >
            </li>
          </ul>
          <img
            src="../images/Logo.svg"
            alt="Imagem do logo"
            class="container__img"
          />
          <h1 class="container__titulo">
            <b class="container__titulo--negrito">tripway</b>
          </h1>
        </div>
      </nav>

      <ul class="opcoes">
        <input type="checkbox" id="opcoes-menu" class="opcoes__botao" />

        <li class="lista-menu__item">
          <a href="pages/destino.html" class="lista-menu__link">Destino</a>
        </li>
        <li class="lista-menu__item">
          <a href="pages/pacotes-servicos.html" class="lista-menu__link"
            >Serviços</a
          >
        </li>
        <li class="lista-menu__item">
          <a href="pages/contato-reserva.html" class="lista-menu__link"
            >Reserva</a
          >
        </li>
      </ul>

      <div class="container">
        <a href="#" class="container__link"
          ><img
            class="container__img"
            src="../images/Usuario.svg"
            alt="Perfil do Usuario"
          />
          <p class="container__texto">Meu perfil</p></a
        >
      </div>
    </header>
    <main class="cor-azul">
      <form action="" method="get">
        <div class="card form-card">
          <fieldset>
            <legend>Formulário</legend>

            <label for="nome">Nome</label>
            <input type="text" id="nome" name="nome" required />

            <label for="email">Email</label>
            <input type="email" id="email" name="email" required />

            <div class="radio-group">
              <label>
                <input type="radio" name="destino" value="Caldas Novas" />
                Caldas Novas
              </label>

              <label>
                <input type="radio" name="destino" value="Rio de Janeiro" />
                Rio de Janeiro
              </label>

              <label>
                <input type="radio" name="destino" value="Bahia" />
                Bahia
              </label>
            </div>

            <label for="data">Data</label>
            <input type="date" id="data" name="data" required />

            <label for="pessoas">Quantidade de pessoas:</label>
            <input type="number" id="pessoas" name="pessoas" min="1" required />

            <label for="mensagem">Mensagem:</label>
            <textarea id="mensagem" name="mensagem" rows="5"></textarea>

            <button class="botao" type="submit">Enviar</button>
          </fieldset>
        </div>
      </form>
    </main>
    <hr />
    <footer class="rodape">
      <p>© 2026 Travel World®</p>
    </footer>
  </body>
</html>
